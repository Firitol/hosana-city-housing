version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hosana_db
    restart: always
    environment:
      POSTGRES_USER: hosana_admin
      POSTGRES_PASSWORD: SecurePassword123!
      POSTGRES_DB: hosana_housing
    volumes:
      - postgres_/var/lib/postgresql/data
      - ../database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - hosana_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hosana_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: hosana_storage
    restart: always
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: SecurePassword456!
    command: server /data --console-address ":9001"
    volumes:
      - minio_/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - hosana_network

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: hosana_app
    restart: always
    environment:
      DATABASE_URL: postgres://hosana_admin:SecurePassword123!@postgres:5432/hosana_housing
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minio_admin
      MINIO_SECRET_KEY: SecurePassword456!
      MINIO_BUCKET: hosana-documents
      JWT_SECRET: YourSuperSecure64CharacterSecretKeyHereForJWT1234567890ABCDEF
      ENCRYPTION_KEY: Your32CharacterEncryptionKeyHere123
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - hosana_network

volumes:
  postgres_data:
  minio_

networks:
  hosana_network:
    driver: bridge